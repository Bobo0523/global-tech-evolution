<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Global Tech: Dual Dimension Evolution (Light Theme)</title>
    <style>
        body { margin: 0; background-color: #ffffff; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #chart-container { width: 100vw; height: 100vh; }
        
        /* 底部控制面板：亮色半透明 */
        #ui-panel {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 80%; background: rgba(255, 255, 255, 0.85); padding: 20px;
            border-radius: 12px; border: 1px solid #cccccc; text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        .info-text { font-size: 24px; color: #333333; margin-bottom: 15px; font-weight: bold;}
        .info-text span { color: #000000; font-size: 30px;} 
        input[type=range] { width: 100%; cursor: pointer; accent-color: #000000; }
        
        /* 图例面板：亮色 */
        .legend { position: absolute; top: 20px; right: 20px; background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 8px; color: #333333; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #ddd;}
        .legend-item { margin: 10px 0; display: flex; align-items: center; font-size: 14px; font-weight: bold;}
        .box-mc { width: 15px; height: 15px; background: #000000; margin-right: 10px;}
        .box-emp { width: 15px; height: 15px; background: #ff3366; margin-right: 10px;}

        /* 悬浮折线图 + 营收构成饼图面板 */
        #hover-chart-container {
            position: absolute; display: none; width: 760px; height: 320px; /* 进一步加宽，给饼图+图例留足空间 */
            background: rgba(255, 255, 255, 0.98); border: 1px solid #cccccc;
            border-radius: 8px; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            pointer-events: none; z-index: 999; padding: 15px;
        }
        #hover-chart-title { color: #333333; font-size: 18px; text-align: left; margin-bottom: 8px; font-weight: bold; }
        #hover-charts-row { display: flex; gap: 16px; }
        .hover-col { display: flex; flex-direction: column; }
        #hover-chart-subtitle { color: #666666; font-size: 11px; text-align: left; margin-bottom: 6px; font-style: italic; background: #f0f0f0; padding: 3px 8px; border-radius: 4px; display: inline-block; align-self: flex-start;}
        #hover-echarts-dom { width: 330px; height: 240px; }
        #hover-pie-dom { width: 380px; height: 230px; }
    </style>
    
    <script src="https://fastly.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>
    <script src="https://fastly.jsdelivr.net/npm/echarts@4.9.0/map/js/world.js"></script>
</head>
<body>

    <div id="chart-container"></div>
    
    <div class="legend">
        <div class="legend-item"><div class="box-mc"></div> Market Cap ($ Billion)</div>
        <div class="legend-item"><div class="box-emp"></div> Employees (Thousands)</div>
    </div>

   <div id="hover-chart-container">
        <div id="hover-chart-title">Company Trend</div>
        <div id="hover-charts-row">
            <div class="hover-col">
                <div id="hover-echarts-dom"></div>
            </div>
            <div class="hover-col">
                <div id="hover-chart-subtitle">Revenue Mix</div>
                <div id="hover-pie-dom"></div>
            </div>
        </div>
    </div>

    <div id="ui-panel">
        <div id="infoText" class="info-text">Year: <span>--</span></div>
        <input type="range" id="timeSlider" min="0" value="0" step="1">
    </div>

    <script>
        var mainChart = echarts.init(document.getElementById('chart-container'));
        var hoverChart = echarts.init(document.getElementById('hover-echarts-dom'));
        var pieChart = echarts.init(document.getElementById('hover-pie-dom'));
        var globalCurrentIndex = 0; 

        // 饼图色板（与品牌色无关，保证多个分段之间区分度）
        var PIE_COLORS = ['#4C6EF5', '#FF6B6B', '#FFB703', '#2DA44E', '#22B8CF', '#9775FA', '#FF922B', '#A9A9A9', '#E64980'];

        // 解析 revenue_model 文本，例如：
        // "iPhone 50% | Services (App Store/iCloud) 26% | Mac 8%"
        // 规则：按 "|" 拆分每个分段；若分段含括号，取右括号之后出现的第一个百分比作为该分段占比
        // （括号内的内容通常是子项细分，不计入主饼图）；否则取分段内第一个百分比。
        function parseRevenueModel(str) {
            if (!str || str.trim() === '') return [];
            var pctRegex = /[<~]?\s?\d+(\.\d+)?%/;
            var segments = str.split('|').map(function (s) { return s.trim(); });
            var result = [];

            segments.forEach(function (seg) {
                var label = null, pctStr = null;
                var parenOpen = seg.indexOf('(');
                var parenClose = seg.lastIndexOf(')');

                if (parenOpen !== -1 && parenClose !== -1 && parenClose > parenOpen) {
                    var afterParen = seg.slice(parenClose + 1);
                    var m = afterParen.match(pctRegex);
                    if (m) {
                        pctStr = m[0];
                        label = seg.slice(0, parenOpen).trim();
                    }
                }

                if (!pctStr) {
                    var m2 = seg.match(pctRegex);
                    if (m2) {
                        pctStr = m2[0];
                        label = seg.slice(0, m2.index).trim();
                    }
                }

                if (pctStr && label) {
                    label = label.replace(/[:\-–—]+$/, '').trim();
                    var numMatch = pctStr.match(/\d+(\.\d+)?/);
                    var value = numMatch ? parseFloat(numMatch[0]) : 0;
                    if (pctStr.indexOf('<') !== -1 && value === 0) value = 0.5;
                    if (label && value > 0) {
                        result.push({ name: label, value: value, display: pctStr.trim() });
                    }
                }
            });

            return result;
        }

        function renderRevenuePie(companyData) {
            var revenueData = parseRevenueModel(companyData.revenue_model);
            var pieDom = document.getElementById('hover-pie-dom');
            var subtitleObj = document.getElementById('hover-chart-subtitle');

            if (revenueData.length === 0) {
                pieDom.style.display = 'none';
                subtitleObj.style.display = 'none';
                return;
            }

            pieDom.style.display = 'block';
            subtitleObj.style.display = 'inline-block';
            subtitleObj.innerText = 'Revenue Mix';

            pieChart.resize();
            pieChart.setOption({
                color: PIE_COLORS,
                tooltip: { show: false },
                legend: {
                    type: 'scroll', orient: 'vertical', left: '52%', right: 5, top: 'middle',
                    itemWidth: 9, itemHeight: 9, itemGap: 7,
                    textStyle: { fontSize: 9.5, color: '#333333' },
                    formatter: function (name) {
                        var item = revenueData.find(function (d) { return d.name === name; });
                        return item ? (name + '  ' + item.display) : name;
                    }
                },
                series: [{
                    type: 'pie',
                    radius: ['30%', '62%'],
                    center: ['25%', '50%'],
                    avoidLabelOverlap: true,
                    data: revenueData,
                    label: { show: false },
                    labelLine: { show: false },
                    itemStyle: { borderColor: '#ffffff', borderWidth: 1 }
                }]
            }, true);
        }

        // 独立视觉缩放系数配置
        var SCALE_MC = 100;  
        var SCALE_EMP = 50;  
        var MAX_ANCHOR = 40; 

        // 颜色设定：市值为纯黑，员工为亮红
        var COLOR_MC = '#000000'; 
        var COLOR_EMP = '#ff3366'; 

        // 加上时间戳，防止浏览器读取旧缓存
        fetch('data.json?v=' + new Date().getTime())
            .then(response => response.json())
            .then(data => {
                var timeAxis = data.timeAxis;
                var companies = data.companies;
                
                var slider = document.getElementById('timeSlider');
                slider.max = timeAxis.length - 1;

                var option = {
                    geo3D: {
                        map: 'world', roam: true, shading: 'lambert',
                        itemStyle: { color: '#f0f0f0', borderColor: '#aaaaaa', borderWidth: 0.8 },
                        viewControl: { distance: 80, alpha: 25, beta: -25, autoRotate: false },
                        light: { main: { intensity: 1.2, shadow: true }, ambient: { intensity: 0.6 } }
                    },
                    series: [
                        { type: 'scatter3D', coordinateSystem: 'geo3D', symbolSize: 12, data: [] }, 
                        { type: 'bar3D', coordinateSystem: 'geo3D', barSize: 0.6, data: [] },
                        { type: 'bar3D', coordinateSystem: 'geo3D', barSize: 0.6, data: [] }  
                    ]
                };
                mainChart.setOption(option);

                function renderFrame(index) {
                    globalCurrentIndex = parseInt(index);
                    document.getElementById('infoText').innerHTML = 'Global Tech Evolution: <span>' + timeAxis[index] + '</span>';
                    
                    var scatterData = [];
                    var mcBars = [];
                    var empBars = [];

                    companies.forEach(company => {
                        var marketCap = company.market_cap[index];
                        var employees = company.employees[index];
                        
                        var mcAlt = marketCap === 0 ? 0 : Math.max(0.5, marketCap / SCALE_MC); 
                        var empAlt = employees === 0 ? 0 : Math.max(0.5, employees / SCALE_EMP); 

                        // 地面锚点
                        scatterData.push({
                            value: [company.coords[0], company.coords[1], 0],
                            itemStyle: { color: company.brand_color }
                        });

                        // 黑色市值柱
                        // 黑色市值柱 (💡 保留标签显示公司名)
                        mcBars.push({
                            name: company.name, 
                            value: [company.coords[0] - 1.0, company.coords[1], mcAlt],
                            itemStyle: { color: COLOR_MC, opacity: 1 },
                            label: { 
                                show: true, 
                                formatter: company.name, 
                                textStyle: {fontSize: 11, color: COLOR_MC, fontWeight: 'bold', backgroundColor: 'rgba(255,255,255,0.7)', padding: [3, 5], borderRadius: 3} 
                            }
                        });

                        // 红色员工柱 (💡 核心修改：关闭标签显示)
                        empBars.push({
                            name: company.name, 
                            value: [company.coords[0] + 1.0, company.coords[1], empAlt],
                            itemStyle: { color: COLOR_EMP, opacity: 1 },
                            label: { 
                                show: false // <--- 就是把这里的 true 改成了 false
                            }
                        });
                    });

                    mcBars.push({ value: [0, 0, MAX_ANCHOR], itemStyle: { opacity: 0 }, label: {show: false} }); 

                    mainChart.setOption({
                        series: [ {data: scatterData}, { data: mcBars }, { data: empBars } ]
                    });
                }

                renderFrame(0);
                slider.addEventListener('input', e => renderFrame(e.target.value));

                // ==========================================
                // 🚀 鼠标悬浮：双 Y 轴折线图 + 气泡数值显示适配
                // ==========================================
              // ==========================================
                // 🚀 纯净版：鼠标悬浮事件（仅保留业务标签，移除技术突破虚线）
                // ==========================================
                var hoverDiv = document.getElementById('hover-chart-container');
                var hoverTitle = document.getElementById('hover-chart-title');

                mainChart.on('mouseover', function(params) {
                    if (params.seriesType !== 'bar3D' || !params.name) return;

                    var companyData = companies.find(c => c.name === params.name);
                    if (!companyData) return;

                    // 自动裁剪未上市的空白年份
                    var startIndex = companyData.market_cap.findIndex(val => val > 0);
                    if (startIndex === -1) startIndex = 0; 

                    var validTimeAxis = timeAxis.slice(startIndex);
                    var validMC = companyData.market_cap.slice(startIndex);
                    var validEmp = companyData.employees.slice(startIndex);

                    var localIndex = globalCurrentIndex - startIndex;
                    var markPointMC = [];
                    var markPointEmp = [];

                    // 1. 动态生成当前年份的数值气泡
                    if (localIndex >= 0 && localIndex < validMC.length) {
                        markPointMC.push({ 
                            coord: [localIndex, validMC[localIndex]], 
                            value: '$' + validMC[localIndex] + 'B', 
                            itemStyle: { color: COLOR_MC },
                            label: { show: true, position: 'top', color: '#000000', fontWeight: 'bold', fontSize: 11, backgroundColor: 'rgba(240,240,240,0.9)', padding: [2, 4], borderRadius: 3 }
                        });
                        markPointEmp.push({ 
                            coord: [localIndex, validEmp[localIndex]], 
                            value: validEmp[localIndex] + 'k', 
                            itemStyle: { color: COLOR_EMP },
                            label: { show: true, position: 'bottom', color: '#ffffff', fontWeight: 'bold', fontSize: 11, backgroundColor: COLOR_EMP, padding: [2, 4], borderRadius: 3 }
                        });
                    }

                    // 2. 动态注入标题，并将营收构成渲染为饼图
                    hoverTitle.innerText = companyData.name;
                    hoverTitle.style.color = companyData.brand_color;
                    renderRevenuePie(companyData);

                    // 3. 显示容器并定位（限制在视口内，避免变宽后超出屏幕右侧/底部）
                    hoverDiv.style.display = 'block';
                    var panelWidth = 760, panelHeight = 320;
                    var posX = params.event.event.clientX + 20;
                    var posY = params.event.event.clientY - 120;
                    posX = Math.min(posX, window.innerWidth - panelWidth - 10);
                    posY = Math.max(10, Math.min(posY, window.innerHeight - panelHeight - 10));
                    hoverDiv.style.left = posX + 'px';
                    hoverDiv.style.top = posY + 'px';

                    hoverChart.resize(); // 强刷画布宽度

                    // 4. 渲染双轴图表 (已彻底移除 markLine)
                    hoverChart.setOption({
                        grid: { top: 50, bottom: 30, left: 10, right: 10, containLabel: true },
                        xAxis: { type: 'category', data: validTimeAxis, axisLabel: { color: '#666666', fontSize: 10, rotate: 45 }, axisLine: { show: false } },
                        yAxis: [
                            { type: 'value', name: 'Market Cap ($B)', min: 'dataMin', nameTextStyle: { color: COLOR_MC, fontSize: 10, fontWeight: 'bold' }, axisLabel: { color: COLOR_MC, fontSize: 10, fontWeight: 'bold' }, splitLine: { lineStyle: { color: 'rgba(0,0,0,0.1)' } } },
                            { type: 'value', name: 'Employees (k)', min: 'dataMin', nameTextStyle: { color: COLOR_EMP, fontSize: 10, fontWeight: 'bold' }, axisLabel: { color: COLOR_EMP, fontSize: 10, fontWeight: 'bold' }, splitLine: { show: false } }
                        ],
                        series: [
                            {
                                name: 'Market Cap', type: 'line', yAxisIndex: 0,
                                data: validMC, smooth: true, symbol: 'circle', symbolSize: 4,
                                lineStyle: { width: 3, color: COLOR_MC },
                                markPoint: { data: markPointMC }
                            },
                            {
                                name: 'Employees', type: 'line', yAxisIndex: 1, 
                                data: validEmp, smooth: true, symbol: 'circle', symbolSize: 4,
                                lineStyle: { width: 3, color: COLOR_EMP, type: 'dashed' }, 
                                markPoint: { data: markPointEmp }
                            }
                        ]
                    });
                });

                mainChart.on('mouseout', function() { hoverDiv.style.display = 'none'; });
            })
            .catch(error => console.error('Error loading JSON:', error));
            
        window.addEventListener('resize', function () {
            mainChart.resize(); hoverChart.resize(); pieChart.resize();
        });
    </script>
</body>
</html>
